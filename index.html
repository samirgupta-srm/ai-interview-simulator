<!DOCTYPE html>
<html>
<head>

<title>AI Interview Simulator</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
}

.container{
background:white;
padding:30px;
margin-top:50px;
width:500px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#1a73e8;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1558b0;
}

#questions{
margin-top:20px;
}

#result{
margin-top:20px;
background:#f0f2f5;
padding:15px;
border-radius:8px;
max-width:100%;
word-wrap:break-word;
white-space:pre-wrap;
overflow-wrap:break-word;
}

pre{
white-space:pre-wrap;
word-wrap:break-word;
overflow-wrap:break-word;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Interview Simulator</h2>

<input id="role" placeholder="Enter Job Role">

<button onclick="startInterview()">Generate Questions</button>

<div id="questions"></div>

<button onclick="submitAnswers()">Submit Answers</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
