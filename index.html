<!DOCTYPE html>
<html>

<head>

<title>AI Interview Simulator</title>

<style>

body{
font-family: Arial, sans-serif;
margin:40px;
background-color:#f4f6f8;
}

h1{
color:#333;
}

input{
padding:8px;
margin-top:5px;
width:250px;
}

button{
padding:8px 14px;
margin-top:10px;
background-color:#007bff;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background-color:#0056b3;
}

.question{
margin-top:20px;
}

#result{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<h1>AI Interview Simulator</h1>

<input id="role" placeholder="Enter job role">

<button onclick="startInterview()">Generate Questions</button>

<div id="questions"></div>

<br>

<button onclick="submitAnswers()">Submit Answers</button>

<div id="result"></div>

<script src="script.js"></script>

</body>

</html>
