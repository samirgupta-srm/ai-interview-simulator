<!DOCTYPE html>
<html>

<head>

<title>AI Interview Simulator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:500px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:80%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 18px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#0056b3;
}

.question{
text-align:left;
margin-top:15px;
}

#result{
margin-top:20px;
background:#f4f7fb;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Interview Simulator</h1>

<input id="role" placeholder="Enter job role">

<br>

<button onclick="startInterview()">Generate Questions</button>

<div id="questions" class="question"></div>

<button onclick="submitAnswers()">Submit Answers</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>

</html>
